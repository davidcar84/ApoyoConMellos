<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#6c5ce7">
  <title>Apoyo con Mellos - Agenda</title>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icons/favicon.ico" type="image/x-icon">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="ApoyoMellos">
</head>
<body>
  <div id="app-container">
  <header class="header">
    <h1>Apoyo con Mellos</h1>
    <p class="header-subtitle">Agenda semanal</p>
    <nav class="header-nav">
      <button class="active" id="btn-agenda">Agenda</button>
      <button id="btn-helpers">Helpers</button>
      <button id="btn-actividades">Actividades</button>
      <button id="btn-config" style="margin-left:auto;font-size:1.1rem" title="Configuración">&#9881;</button>
    </nav>
  </header>

  <!-- Week Navigator -->
  <div class="week-nav">
    <button id="btn-prev-week" aria-label="Semana anterior">&larr;</button>
    <div class="week-label" id="week-label">Cargando...</div>
    <button id="btn-next-week" aria-label="Semana siguiente">&rarr;</button>
  </div>

  <!-- Summary Bar -->
  <div class="summary-bar" id="summary-bar"></div>

  <!-- Main Content -->
  <main id="main-content">
    <div class="loading"><div class="spinner"></div></div>
  </main>

  <!-- FAB: Add Block -->
  <button class="fab" id="fab-add" title="Agregar bloque" aria-label="Agregar bloque">+</button>

  <!-- Modal: Create/Edit Block -->
  <div class="modal-overlay" id="modal-block">
    <div class="modal">
      <button class="modal-close" id="modal-block-close">&times;</button>
      <h2 id="modal-block-title">Nuevo bloque</h2>
      <form id="form-block">
        <input type="hidden" id="block-id">
        <input type="hidden" id="block-week">
        <div class="form-group">
          <label for="block-fecha">Fecha</label>
          <input type="date" id="block-fecha" required>
        </div>
        <div class="form-group">
          <label for="block-horario">Bloque horario</label>
          <select id="block-horario" required></select>
        </div>
        <div class="form-group">
          <label>Actividades necesitadas</label>
          <div class="checkbox-list" id="block-actividades"></div>
        </div>
        <div class="form-group">
          <label>Asignar helpers</label>
          <div class="checkbox-list" id="block-helpers"></div>
        </div>
        <div class="form-group">
          <label for="block-personas">Personas necesarias</label>
          <select id="block-personas">
            <option value="1">1 persona</option>
            <option value="2">2 personas</option>
            <option value="3">3 personas</option>
          </select>
        </div>
        <div class="form-group">
          <div class="checkbox-item" style="background:var(--color-sin-cubrir-bg)">
            <input type="checkbox" id="block-importante">
            <label for="block-importante" style="color:var(--color-sin-cubrir);font-weight:600">Marcar como PRIORITARIO</label>
          </div>
        </div>
        <div class="form-group">
          <label for="block-notas">Notas</label>
          <textarea id="block-notas" placeholder="Ej: Cita médica de 10 a 12"></textarea>
        </div>
        <button type="submit" class="btn btn-primary btn-block">Guardar bloque</button>
        <button type="button" class="btn btn-danger btn-block btn-sm" id="btn-delete-block" style="margin-top:8px;display:none">Eliminar bloque</button>
      </form>
    </div>
  </div>

  <!-- Modal: Helpers list -->
  <div class="modal-overlay" id="modal-helpers">
    <div class="modal">
      <button class="modal-close" id="modal-helpers-close">&times;</button>
      <h2>Helpers</h2>
      <div id="helpers-list"></div>
      <button class="btn btn-primary btn-block" id="btn-add-helper" style="margin-top:12px">+ Agregar helper</button>
    </div>
  </div>

  <!-- Modal: Create/Edit Helper -->
  <div class="modal-overlay" id="modal-helper-form">
    <div class="modal">
      <button class="modal-close" id="modal-helper-form-close">&times;</button>
      <h2 id="modal-helper-title">Nuevo helper</h2>
      <form id="form-helper">
        <input type="hidden" id="helper-edit-id">
        <div class="form-group">
          <label for="helper-nombre">Nombre</label>
          <input type="text" id="helper-nombre" required placeholder="Ej: Abuela María">
        </div>
        <div class="form-group">
          <label for="helper-telefono">Teléfono</label>
          <input type="tel" id="helper-telefono" placeholder="Opcional">
        </div>
        <div class="form-group">
          <label>Actividades que puede hacer</label>
          <div class="checkbox-list" id="helper-actividades-list"></div>
        </div>
        <div class="form-group">
          <label>Disponibilidad</label>
          <div class="checkbox-list" id="helper-disponibilidad-list"></div>
        </div>
        <div class="form-group">
          <label for="helper-notas">Notas</label>
          <textarea id="helper-notas" placeholder="Ej: Solo puede los fines de semana"></textarea>
        </div>
        <button type="submit" class="btn btn-primary btn-block">Guardar helper</button>
        <button type="button" class="btn btn-danger btn-block btn-sm" id="btn-delete-helper" style="margin-top:8px;display:none">Eliminar helper</button>
      </form>
    </div>
  </div>

  <!-- Modal: Actividades list -->
  <div class="modal-overlay" id="modal-actividades">
    <div class="modal">
      <button class="modal-close" id="modal-actividades-close">&times;</button>
      <h2>Catálogo de Actividades</h2>
      <div id="actividades-list"></div>
      <button class="btn btn-primary btn-block" id="btn-add-actividad" style="margin-top:12px">+ Agregar actividad</button>
    </div>
  </div>

  <!-- Modal: Create/Edit Actividad -->
  <div class="modal-overlay" id="modal-actividad-form">
    <div class="modal">
      <button class="modal-close" id="modal-actividad-form-close">&times;</button>
      <h2 id="modal-actividad-title">Nueva actividad</h2>
      <form id="form-actividad">
        <input type="hidden" id="actividad-edit-id">
        <div class="form-group">
          <label for="actividad-nombre">Nombre</label>
          <input type="text" id="actividad-nombre" required placeholder="Ej: Dar de comer">
        </div>
        <div class="form-group">
          <label for="actividad-categoria">Categoría</label>
          <select id="actividad-categoria" required></select>
        </div>
        <div class="form-group">
          <label for="actividad-personas">Personas requeridas</label>
          <select id="actividad-personas">
            <option value="1">1 persona</option>
            <option value="2">2 personas</option>
            <option value="3">3 personas</option>
          </select>
        </div>
        <div class="form-group">
          <div class="checkbox-item">
            <input type="checkbox" id="actividad-experiencia">
            <label for="actividad-experiencia">Requiere experiencia</label>
          </div>
        </div>
        <div class="form-group">
          <label for="actividad-instrucciones">Instrucciones</label>
          <textarea id="actividad-instrucciones" placeholder="Instrucciones detalladas para esta actividad" rows="4"></textarea>
        </div>
        <button type="submit" class="btn btn-primary btn-block">Guardar actividad</button>
        <button type="button" class="btn btn-danger btn-block btn-sm" id="btn-delete-actividad" style="margin-top:8px;display:none">Eliminar actividad</button>
      </form>
    </div>
  </div>

  <!-- Modal: Config -->
  <div class="modal-overlay" id="modal-config">
    <div class="modal">
      <button class="modal-close" id="modal-config-close">&times;</button>
      <h2>Configuración</h2>
      <form id="form-config">
        <div class="form-group">
          <label for="config-token">GitHub Token</label>
          <input type="password" id="config-token" placeholder="github_pat_...">
          <small style="color:var(--color-text-light);display:block;margin-top:4px">Permite sincronizar datos entre dispositivos via GitHub API</small>
        </div>
        <div id="config-sync-status" style="margin-bottom:12px"></div>
        <button type="submit" class="btn btn-primary btn-block">Guardar</button>
        <button type="button" class="btn btn-outline btn-block btn-sm" id="btn-force-sync" style="margin-top:8px">Forzar sincronización desde servidor</button>
      </form>
    </div>
  </div>

  </div><!-- /app-container -->

  <script src="js/utils.js"></script>
  <script src="js/data-service.js"></script>
  <script src="js/notifications.js"></script>
  <script src="js/app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      // Unregister old service workers, clear caches, then register fresh
      navigator.serviceWorker.getRegistrations().then(regs => {
        Promise.all(regs.map(r => r.unregister())).then(() => {
          caches.keys().then(keys => Promise.all(keys.map(k => caches.delete(k)))).then(() => {
            navigator.serviceWorker.register('./sw.js');
          });
        });
      });
    }
  </script>
</body>
</html>
